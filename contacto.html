<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pasos & Estilo | Contacto</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <div class="logo">PASOS & ESTILO</div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="tallas.html">Tallas</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="contenedor">
        <h2>Contacto Directo</h2>
        <div class="form-container">
            <form>
                <!-- Alineación con DIVs (Indicador 1.3.1) -->
                <div class="campo">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" placeholder="Tu nombre">
                </div>
                <div class="campo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com">
                </div>
                <!-- Botón convertido en enlace (Indicador 1.3.1) -->
                <button type="submit" class="btn-enlace-estilo">Enviar Mensaje Ahora</button>
            </form>
        </div>
    </main>
</body>
</html>
